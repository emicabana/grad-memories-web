<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Auth System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background: #45a049;
        }
        .error { color: red; }
        .success { color: green; }
        pre {
            background: #f4f4f4;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>Sistema de Autenticación - Test</h1>
    
    <div class="test-section">
        <h2>Pruebas Básicas</h2>
        <button onclick="testSignup()">Test: Crear Cuenta</button>
        <button onclick="testLogin()">Test: Iniciar Sesión</button>
        <button onclick="testForgotPassword()">Test: Olvidé Contraseña</button>
        <button onclick="clearStorage()">Limpiar localStorage</button>
        <div id="test-output"></div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        function log(message, type = 'info') {
            const output = document.getElementById('test-output');
            const className = type === 'error' ? 'error' : type === 'success' ? 'success' : 'info';
            output.innerHTML += `<p class="${className}">${new Date().toLocaleTimeString()} - ${message}</p>`;
        }

        function testSignup() {
            log('=== INICIANDO TEST DE SIGNUP ===', 'info');
            
            // Simular email verification
            sendVerificationEmail('test@example.com');
            log('Se envió código de verificación', 'success');
            
            // Obtener código de localStorage
            const verifications = JSON.parse(localStorage.getItem('gradmemories_verification') || '[]');
            const verification = verifications.find(v => v.email === 'test@example.com');
            
            if (verification) {
                log(`Código generado: ${verification.code}`, 'info');
                
                // Verificar código
                const result = verifyEmailCode('test@example.com', verification.code);
                if (result.ok) {
                    log('Código verificado correctamente', 'success');
                    
                    // Registrar usuario
                    const registerResult = registerUser('test@example.com', 'password123', 'Juan Pérez', 'Colegio XYZ');
                    if (registerResult.ok) {
                        log('Usuario registrado correctamente', 'success');
                        log(`ID del usuario: ${registerResult.user.id}`, 'info');
                    } else {
                        log(`Error al registrar: ${registerResult.error}`, 'error');
                    }
                } else {
                    log(`Error al verificar código: ${result.error}`, 'error');
                }
            } else {
                log('No se encontró el código de verificación', 'error');
            }
        }

        function testLogin() {
            log('=== INICIANDO TEST DE LOGIN ===', 'info');
            
            // Primero crear un usuario
            const users = getAllUsers();
            if (users.length === 0) {
                log('No hay usuarios registrados. Ejecuta primero "Test: Crear Cuenta"', 'error');
                return;
            }
            
            const user = users[0];
            log(`Intentando login con: ${user.email}`, 'info');
            
            const result = loginUser(user.email, user.password);
            if (result.ok) {
                log('Login exitoso', 'success');
                log(`Usuario actual: ${result.user.nombre} (${result.user.email})`, 'info');
                
                const currentUser = getCurrentUser();
                log(`Verificación en localStorage: ${currentUser.nombre}`, 'success');
            } else {
                log(`Error de login: ${result.error}`, 'error');
            }
        }

        function testForgotPassword() {
            log('=== INICIANDO TEST DE RECUPERACIÓN DE CONTRASEÑA ===', 'info');
            
            const users = getAllUsers();
            if (users.length === 0) {
                log('No hay usuarios. Ejecuta "Test: Crear Cuenta" primero', 'error');
                return;
            }
            
            const email = users[0].email;
            log(`Solicitando reset para: ${email}`, 'info');
            
            const result = requestPasswordReset(email);
            if (result.ok) {
                log('Solicitud de reset enviada', 'success');
                
                // Obtener código
                const resets = JSON.parse(localStorage.getItem('gradmemories_password_reset') || '[]');
                const reset = resets.find(r => r.email === email);
                
                if (reset) {
                    log(`Código de reset: ${reset.code}`, 'info');
                    
                    // Verificar código y cambiar contraseña
                    const verifyResult = verifyPasswordReset(email, reset.code, 'newpassword123');
                    if (verifyResult.ok) {
                        log('Contraseña actualizada correctamente', 'success');
                        
                        // Intentar login con nueva contraseña
                        const loginResult = loginUser(email, 'newpassword123');
                        if (loginResult.ok) {
                            log('Login con nueva contraseña exitoso', 'success');
                        } else {
                            log(`Error al login con nueva contraseña: ${loginResult.error}`, 'error');
                        }
                    } else {
                        log(`Error al verificar reset: ${verifyResult.error}`, 'error');
                    }
                }
            } else {
                log(`Error en solicitud: ${result.error}`, 'error');
            }
        }

        function clearStorage() {
            localStorage.clear();
            sessionStorage.clear();
            document.getElementById('test-output').innerHTML = '';
            log('localStorage y sessionStorage limpiados', 'success');
        }

        // Test al cargar
        window.addEventListener('DOMContentLoaded', () => {
            log('Sistema de autenticación cargado', 'success');
        });
    </script>
</body>
</html>
